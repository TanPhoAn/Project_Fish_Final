<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/header :: head }"><title>contact page</title></head>

<body class="bg-gray-50">

<!-- Navbar -->
<header th:replace="~{common/header :: navbar}"></header>
<div th:replace="~{common/header :: cart}"></div>
<div th:replace="~{common/header :: toast-message}"></div>

<!-- CONTACT SECTION -->
<section class="max-w-5xl mx-auto mt-10 p-6">

    <h1 class="text-4xl font-semibold text-center text-[var(--color-primary)]">
        Contact Us
    </h1>

    <p class="text-center mt-2 text-gray-600">
        We're here to help. Contact our team anytime!
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-12">

        <!-- LEFT: COMPANY INFO -->
        <div class="space-y-6 p-6 bg-white shadow-lg rounded-xl">

            <!-- Avatar / Logo -->
            <div class="flex justify-center">
                <img src="/images/company_banner.png"
                     alt="Company Logo"
                     class=" rounded-full border shadow">
            </div>

            <h2 class="text-2xl font-bold text-center">Aquarina Co.</h2>

            <div class="space-y-3 text-gray-700">
                <p><strong>Email:</strong> phuoctanphan30@gmail.com</p>
                <p><a href="tel:+84907568193"><strong>Phone:</strong> +84 0123 456 789</a></p>
                <p><strong>Address:</strong> Block M2, Ton That Thuyet Apartment, HCMC</p>
            </div>

            <!-- Social -->
            <div class="flex space-x-4 justify-center mt-4">
                <a href="https://www.facebook.com/tan.pho.an.2025" class="text-blue-600 hover:text-blue-800">Facebook</a>
                <a href="#" class="text-pink-500 hover:text-pink-700">Instagram</a>
            </div>
        </div>

        <!-- RIGHT: CONTACT FORM -->
        <div class="p-6 bg-white shadow-lg rounded-xl">
            <h2 class="text-xl font-semibold mb-4">Send us a Message</h2>

            <form th:action="@{/contact/request-sending}"  method="post" class="space-y-4 flex flex-col gap-16">
                <div class="input-info-container flex flex-col gap-4">
                    <input type="text"
                           placeholder="Your Name"
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[var(--color-primary)]"
                           th:field="${requestForm.name}"
                    />

                    <input type="email"
                           placeholder="Your Email"
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[var(--color-primary)]"
                           th:field="${requestForm.email}"
                    />

                    <textarea placeholder="Message..."
                              rows="5"
                              class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-[var(--color-primary)]"
                              th:field="${requestForm.message}"
                    ></textarea>
                </div>

                <div class="submit-info-button-container">
                    <button type="submit"
                            class="w-full bg-[var(--color-primary)] text-white py-3 rounded-lg hover:bg-blue-400 transition">
                        Send Message
                    </button>
                </div>
            </form>
        </div>

    </div>
</section>

<script src="/js/cart-loading.js"></script>
</body>
</html>
