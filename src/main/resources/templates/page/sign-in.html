<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/header :: head}">
    <title>Register</title>
</head>

<body>
<!-- Card -->
<section class="bg-white">
    <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0  dark:border-gray-700">
            <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl">
                    Login your account to dive into aquarium
                </h1>

                <div th:if="${param.error}">
                    Invalid username and password.</div>
                <div th:if="${param.logout}">
                    You have been logged out.</div>
                <form th:action="@{/login}" method="post" class="space-y-4 md:space-y-6 flex flex-col">
                    <div>
                        <label for="username" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your username</label>

                        <input id="username" type="text" name="username" placeholder="test@example.com"
                               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                    </div>

                    <div>
                        <label for="password" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your password</label>

                        <input id="password" type="password" name="password" placeholder="Your password"
                               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                    </div>


                    <button type="submit" value="log in"
                            class="w-full bg-red-500 text-white py-2 rounded-lg font-medium
                       hover:bg-red-700 transition duration-200">
                        Log in
                    </button>
                </form>
            <div class="text-end">
                <p class="text-sm font-medium text-gray-900">Don't have an account? <a class="text-red-500" href="/register">Register an account here</a> </p>
            </div>
            </div>
        </div>
    </div>

</section>
<!--<footer th:replace="~{page/common/footer :: footer}"></footer>-->

</body>
</html>
