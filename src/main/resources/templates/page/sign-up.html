<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/common/header :: head}">
    <title>Sign up</title>
    <link rel="stylesheet" href="/css/output.css">
</head>

<body>
<!-- Card -->
<section class="bg-white">
    <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0  dark:border-gray-700">
                <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                    <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl">
                        Create an account
                    </h1>
                    <h1 class="text-base font-normal leading-tight tracking-tight text-gray-900 md:text-2xl">
                        Enter your details below
                    </h1>


                    <form th:action="@{/register/save}" th:object="${registerForm}"  method="post" class="space-y-4 md:space-y-6 flex flex-col">
                        <div>
                            <label for="name" class="block mb-2 text-sm font-medium text-gray-900">Enter your username</label>
                            <input id="name" type="text" th:field="*{name}" placeholder="Peter"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>

                        <div>
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your email</label>
                            <input id="email" type="email" th:field="*{email}" placeholder="test@example.com"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>

                        </div>

                        <div>
                            <label for="address" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your address</label>
                            <input id="address" type="text" th:field="*{address}" placeholder="Address"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>

                        <div>
                            <label for="phone" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your phone number</label>

                            <input id="phone" type="text" th:field="*{phone}" placeholder="0111111111"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>



                        <div>
                            <label for="password" class="block mb-2 text-sm font-medium text-gray-900 ">Enter your password</label>

                            <input id="password" type="password" th:field="*{password}" placeholder="Your password"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>


                        <button type="submit"
                                class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium
                       hover:bg-blue-700 transition duration-200">
                            Register
                        </button>
                    </form>
                </div>
        </div>
    </div>

</section>
<!--<footer th:replace="~{page/common/footer :: footer}"></footer>-->

</body>
</html>
