<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/header :: head }"><title>home page</title></head>
<header th:replace="~{common/header :: navbar}"></header>
<div th:replace="~{common/header :: cart}"></div>
<div th:replace="~{common/header :: toast-message}"></div>
<!-- ================= PRODUCTS ================= -->
<body class="bg-[var(--color-bg)]   text-gray-800">
<!-- ================= HERO ================= -->
<section class="max-w-7xl mx-auto px-4 py-12 md:py-20 grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
    <div class="text-center md:text-left">
        <h2 class="text-4xl md:text-5xl font-bold leading-tight mb-6">
            Everything for your
            <span class="text-[#6995B1]">Aquarium</span>
        </h2>

        <p class="text-gray-600 mb-8 max-w-lg mx-auto md:mx-0">
            Premium ornamental fish, aquariums and accessories.
            Make your underwater world beautiful and healthy.
        </p>

        <a href="#products"
           class="inline-block px-8 py-4 bg-[#6995B1] text-white rounded-full text-sm font-semibold hover:opacity-90 transition transform hover:scale-105">
            Shop Now
        </a>
    </div>

    <div class="flex justify-center">
        <img src="/images/output-onlinepngtools.png"
             alt="Fish Banner"
             class="w-full max-w-sm md:max-w-none"
        >
    </div>
</section>

<section id="products" class="bg-white py-10 md:py-16" th:each="product : ${productsByCategory}">
    <div class="max-w-7xl mx-auto px-5">
        <h3 class="text-2xl md:text-3xl font-bold text-center mb-10 md:mb-12" th:text="${product.getKey().label}" >
        </h3>

        <!-- Grid for <= 4 products -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-10" th:if="${product.getValue().size()} <= 4 ">

            <!-- PROD CARD -->
            <div class="bg-[#f9f7f3] rounded-2xl p-6 shadow-sm flex flex-col h-full border border-transparent hover:border-[#6995B1] transition-all"
                 th:each="prod : ${product.getValue()}">
                <img th:src="@{'/uploads/' + ${product.getKey().name()} + '/' + ${prod.productImage}}"
                     class="rounded-xl mb-4 h-48 w-full object-cover" alt="">

                <h4 class="font-semibold text-lg mb-2"
                    th:text="${prod.productName}"></h4>

                <div class="flex-1">
                    <p class="text-sm text-gray-500 mb-4 line-clamp-2"
                       th:text="${prod.productDescription}"></p>
                </div>

                <div class="flex items-center justify-between mt-auto">
                    <span class="font-bold text-[#6995B1]"
                          th:text="${prod.productPrice}+ '$'"></span>

                    <button th:data-id="${prod.getId()}" class="cursor-pointer add-to-cart-btn px-4 py-2 text-sm bg-[#6995B1] text-white rounded-full hover:opacity-90">
                        Add to cart
                    </button>
                </div>
            </div>
        </div>

        <!-- Grid for > 4 products with "More" button -->
        <div class="flex flex-col lg:flex-row items-center justify-center gap-6 lg:gap-8" th:unless="${product.getValue().size()} <= 4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 flex-1 w-full" >
                <div class="bg-[#f9f7f3] rounded-2xl p-6 shadow-sm hover:shadow-md border border-transparent hover:border-[#6995B1]
            transition-all flex flex-col h-full"
                     th:each="prod : ${product.getValue().subList(0, T(java.lang.Math).min(4, product.getValue().size()))}">
                    <img th:src="@{'/uploads/' + ${product.getKey().name()} + '/' + ${prod.productImage}}"
                         class="rounded-xl mb-4 h-48 w-full object-cover" alt="product image">

                    <h4 class="font-semibold text-lg mb-2"
                        th:text="${prod.productName}"></h4>

                    <div class="flex-1">
                        <p class="text-sm text-gray-500 mb-4 line-clamp-2"
                           th:text="${prod.productDescription} "></p>
                    </div>

                    <div class="flex items-center justify-between mt-auto">
                        <span class="font-bold text-[#6995B1]"
                              th:text="${prod.productPrice} + '$'"></span>
                        <button  th:data-id="${prod.getId()}" class="cursor-pointer add-to-cart-btn px-4 py-2 text-sm bg-[#6995B1] text-white rounded-full hover:opacity-90">
                            Add to cart
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="product-page-button" class="flex justify-center py-6 lg:py-44 px-4 lg:px-2 w-full lg:w-auto">
                <a th:href="@{'/products/' + ${product.getKey().toString().toLowerCase().replace('_','-')} }  " type="button" 
                   class="rounded w-full lg:w-auto text-center
            hover:bg-gradient-to-l hover:from-teal-200 hover:to-lime-200 focus:ring-4
            focus:outline-none outline-blue-500 outline-dashed outline-1
            px-6 md:px-4 py-4 md:py-3 leading-5" >
                    <span class="text-lg" th:utext="'More ' + ${product.getKey().label} + '<br>'"></span>
                    <span  th:replace="~{common/icon :: arrow-right-icon}"></span>
                </a>
            </div>
        </div>
    </div>
</section>


<!-- ================= FOOTER ================= -->
<footer th:replace="~{common/footer :: footer}"></footer>
<script src="/js/cart-loading.js"></script>
</body>
</html>
