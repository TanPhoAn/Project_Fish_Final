<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Aquarina Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind output -->
    <link href="/css/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chilanka&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>


<!-- ================= HEADER ================= -->
<header class="bg-white shadow-sm" th:fragment="navbar">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
        <a href="/home"><h1 class="text-3xl font-semibold text-[var(--color-primary)]">Aquarina</h1></a>

        <nav class="space-x-10 text-sm font-medium text-gray-600">
            <a th:href="@{/home}" class="hover:text-[#6995B1]">Home</a>
            <a href="#" class="hover:text-[#6995B1]">Fish</a>
            <a href="#" class="hover:text-[#6995B1]">Accessories</a>
            <a href="#" class="hover:text-[#6995B1]">Contact</a>
        </nav>

        <div class=" flex items-center space-x-3 text-sm">
            <a th:if="${currentUser == null}" th:href="@{/login}" class="hover:text-[var(--color-primary)]">Log In</a>
            <a  th:if="${currentUser != null}"
                  >Aloha
                <a th:href="@{/user/profile}" class="text-cyan-400" th:text="${currentUser.name}"></a>
            </a>
            <form th:if="${currentUser != null}" th:action="@{/logout}" method="post" >
                <button class= "cursor-pointer hover:text-[var(--color-primary)]" type="submit">
                    Log Out
                </button>
            </form>
            <a th:if="${currentUser == null}" th:href="@{/register}" class="hover:text-[var(--color-primary)]">Sign Up</a>

            <button th:if="${currentUser != null}"  id="cart-icon" class="px-5 py-2.5 bg-[var(--color-primary)] text-white rounded-full hover:opacity-90">
                Cart
            </button>



        </div>
    </div>

</header>
                            <!-- cart -->
<div th:fragment="cart" id="cart-modal"
     class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

    <div class="bg-white w-[700px] rounded-xl shadow-xl p-6 relative">
        <div class="close-cart-button py-2">
            <button type="button" id="close-cart"
                    class="absolute top-3 right-3 text-gray-500 hover:text-black">
                ✕
            </button>
        </div>


        <div id="cart-modal-content">
            <!-- AJAX inject content -->
        </div>

    </div>

</div>
                            <!-- cart -->

                    <!-- Toast alert message -->

<div th:fragment="toast-message" id="toast-container" class="toast-container fixed top-5 right-5 z-30 hidden">
    <div id="toast-success" class="flex items-center w-full max-w-sm p-4 text-body bg-white rounded-base shadow-xs border border-default" >
        <div class="inline-flex items-center justify-center shrink-0 w-7 h-7 text-fg-success bg-success-soft rounded">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11.917 9.724 16.5 19 7.5"/></svg>
            <span class="sr-only">Check icon</span>
        </div>
        <div class="ms-3 text-sm font-normal" id="add-success-toast"></div>
        <button id="toast-close" type="button" class="ms-auto flex items-center justify-center text-body hover:text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded text-sm h-8 w-8 focus:outline-none" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
        </button>
    </div>
</div>
                    <!-- Toast alert message -->
</html>
